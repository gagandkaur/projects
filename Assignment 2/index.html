<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="gallery-container">

        <!-- Preview Area -->
        <div class="preview">
            <img id="previewImage" src="https://picsum.photos/id/1015/600/400" alt="Preview">
        </div>

        <!-- Thumbnails -->
        <div class="thumbnails">
            <img src="https://picsum.photos/id/1015/600/400" class="thumb active">
            <img src="https://picsum.photos/id/1016/600/400" class="thumb">
            <img src="https://picsum.photos/id/1018/600/400" class="thumb">
            <img src="https://picsum.photos/id/1020/600/400" class="thumb">
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
